name: mobile_softwart
description: App móvil de consulta y seguimiento — SoftwArt (Proyecto de Grado SENA)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  http: ^1.2.1
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/softwart-logo.png"
  adaptive_icon_background: "#002926"
  adaptive_icon_foreground: "assets/images/softwart-logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
